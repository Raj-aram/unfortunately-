<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | LexConnect</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
<div class="auth-wrapper py-4">
  <div class="card auth-card" style="max-width:480px;">

    <div class="text-center mb-4">
      <div class="auth-logo"><i class="bi bi-scales"></i> Lex<span>Connect</span></div>
      <p class="text-muted mt-1" style="font-size:.85rem;">Create your account – Book a Consultation</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ 'danger' if cat == 'error' else cat }} alert-dismissible alert-auto py-2" role="alert">
        {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('register') }}" novalidate>
      <!-- Hidden: always register as client -->
      <input type="hidden" name="role" value="client"/>

      <div class="mb-3">
        <label class="form-label fw-semibold" for="name">Full Name</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-person text-muted"></i></span>
          <input type="text" class="form-control" id="name" name="name"
                 placeholder="Rajesh Kumar" required autofocus/>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold" for="email">Email address</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" class="form-control" id="email" name="email"
                 placeholder="you@example.com" required/>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold" for="password">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="Min 6 characters" minlength="6" required/>
        </div>
      </div>

      <button type="submit" class="btn btn-primary-custom w-100 py-2">
        <i class="bi bi-person-plus me-1"></i> Create Account
      </button>
    </form>

    <div class="divider"></div>
    <p class="text-center mb-0" style="font-size:.88rem;">
      Already registered?
      <a href="{{ url_for('login') }}" class="fw-semibold">Sign in</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
